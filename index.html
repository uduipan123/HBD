<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Pika ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-container"></div>

    <div id="login-page" class="page active">
        <div class="login-container">
            <h1>Haii Sayang.. ❤️</h1>
            <p>Ketik namamu di sini ya:</p>
            <input type="text" id="nameInput" placeholder="Nama kamu...">
            <button class="btn-login" onclick="checkName()">Masuk</button>
            <p id="error-msg">Akses ditolak! Bukan Pika-ku 🤨</p>
        </div>
    </div>

    <div id="landing-page" class="page">
        <div class="header">
            <h2>Home Page</h2>
        </div>
        <div class="menu-container">
            <div class="menu-item" onclick="showPage('card-page')">
                <div class="icon-box">💌</div>
                <p>Kartu Ucapan</p>
            </div>
            <div class="menu-item" onclick="showPage('photo-page')">
                <div class="icon-box">📸</div>
                <p>Momen Kita</p>
            </div>
            <div class="menu-item" onclick="showPage('music-page')">
                <div class="icon-box">🎵</div>
                <p>Lagu Kita</p>
            </div>
            <div class="menu-item" onclick="showPage('video-page')">
                <div class="icon-box">🎥</div>
                <p>Video Spesial</p>
            </div>
            <div class="menu-item">
                <div class="icon-box">📈</div>
                <p>Our Stats</p>
            </div>
            <div class="menu-item">
                <div class="icon-box">✉️</div>
                <p>Chat Sayang</p>
            </div>
        </div>
    </div>

    <div id="card-page" class="page">
        <div class="header-pink">
            <button class="back-link" onclick="showPage('landing-page')">⬅ Kembali</button>
        </div>
        <div class="card-content">
            <div class="birthday-card">
                <div class="card-front">
                    <h2>Klik Sayang ❤️</h2>
                </div>
                <div class="card-inside">
                    <h3>Happy Bday Pika!</h3>
                    <p>Semoga bahagia terus bareng aku ya!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkName() {
            const name = document.getElementById('nameInput').value.toLowerCase();
            if (name.includes("pika")) {
                showPage('landing-page');
                createHearts();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function createHearts() {
            const container = document.querySelector('.hearts-container');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart-fly';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                container.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 500);
        }

        document.querySelector('.birthday-card').addEventListener('click', function() {
            this.classList.toggle('open');
        });
    </script>
</body>
</html>
