<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="birthday-card">
        <div class="card-front">
            <div class="front-content">
                <h2>Happy Birthday!</h2>
                <p>Klik/Hover untuk Membuka</p>
                <div class="cake">🎂</div>
            </div>
        </div>
        
        <div class="card-inside">
            <h2>Untukmu,</h2>
            <p>Semoga hari ini penuh dengan kebahagiaan, tawa, dan semua hal yang kamu impikan.</p>
            <p class="wish">Wish you all the best! ✨</p>
            <p class="signature">- Dari Temanmu</p>
        </div>
    </div>
</body>
</html>
